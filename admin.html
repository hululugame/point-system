<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>後台管理</title>

<style>
body {
  font-family: sans-serif;
  background: #f5f5f5;
  display: flex;
  justify-content: center;
}

.container {
  width: 90%;
  max-width: 420px;
  background: white;
  padding: 20px;
  border-radius: 16px;
  margin-top: 30px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
}

button {
  width: 100%;
  padding: 12px;
  background: green;
  color: white;
  border: none;
}
</style>
</head>

<body>

<div class="container">

<div id="loginBox">
  <h2>🔐 後台登入</h2>
  <input type="password" id="password" placeholder="輸入密碼">
  <button onclick="login()">登入</button>
</div>

<div id="adminPanel" style="display:none;">

<h2>店員後台</h2>

<h2>店員後台</h2>

<h3>產生點數序號</h3>
<input id="points" placeholder="點數">
<button onclick="generate()">產生序號</button>
<p id="result"></p>

<h3>扣除客人點數</h3>
<input id="phone" placeholder="手機">
<input id="usePointsInput" placeholder="扣點">
<button onclick="usePoints()">扣點</button>

<h3>消費累積（1%）</h3>
<input id="buyPhone" placeholder="手機">
<input id="amount" placeholder="金額">
<button onclick="addAmount()">累積點數</button>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbzjW_IR0JF_psUtgC5knJtKsRHtX09fXg0ytKBgFgvhzpqOzp5DmJGwTuIRRmW_pVc7/exec";

// 產生序號
function generate() {
  const points = document.getElementById("points").value;

  fetch(API + "?action=generate&points=" + points)
  .then(res => res.text())
  .then(text => {
    document.getElementById("result").innerText = text;
  });
}

// 扣點
function usePoints() {
  const phone = document.getElementById("phone").value;
  const points = document.getElementById("usePointsInput").value;

 fetch(API + "?action=usePoints&phone=" + phone + "&usePoints=" + points)
  .then(res => res.text())
  .then(text => alert(text));
}

// 累積點數
function addAmount() {
  const phone = document.getElementById("buyPhone").value;
  const amount = document.getElementById("amount").value;

fetch(API + "?action=addPointsByAmount&phone=" + phone + "&amount=" + amount)
  .then(res => res.text())
  .then(text => alert(text));
}

function login() {
  const pwd = document.getElementById("password").value;

  if (pwd === "az20408") {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
  } else {
    alert("密碼錯誤");
  }
}

</script>

</body>
</html>
