<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>後台管理</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f5f5;
  display: flex;
  justify-content: center;
}

.container {
  width: 90%;
  max-width: 420px;
  background: white;
  padding: 20px;
  border-radius: 16px;
  margin-top: 20px;
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 16px;
}

button {
  background: #4CAF50;
  color: white;
  border: none;
}

.section {
  margin-top: 20px;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="container">

<!-- 登入 -->
<div id="loginBox">
  <h2>🔐 後台登入</h2>
  <input type="password" id="password" placeholder="輸入密碼">
  <button onclick="login()">登入</button>
</div>

<!-- 後台 -->
<div id="adminPanel" class="hidden">

  <h2>店員後台</h2>

  <!-- 產生序號 -->
  <div class="section">
    <h3>產生點數序號</h3>
    <input id="points" placeholder="輸入點數">
    <button onclick="generate()">產生序號</button>
  </div>

  <!-- 扣點 -->
  <div class="section">
    <h3>扣除客人點數</h3>
    <input id="phone" placeholder="手機號碼">
    <input id="usePoints" placeholder="扣除點數">
    <button onclick="usePointsFunc()">扣點</button>
  </div>

  <!-- 消費累積 -->
  <div class="section">
    <h3>消費累積點數（1%）</h3>
    <input id="buyPhone" placeholder="手機號碼">
    <input id="amount" placeholder="消費金額">
    <button onclick="addAmount()">累積點數</button>
  </div>

</div>

</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbyIRyOz7x8u6XUu4qFBmap8gJ-SDsH0QPJhof3l6bDO-YsgiiKLW5xME6mvq-_KNcmE/exec";

// 登入
function login() {
  const pwd = document.getElementById("password").value;

  if (pwd === "az20408") {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").classList.remove("hidden");
  } else {
    alert("密碼錯誤");
  }
}

function generate() {
  const points = document.getElementById("points").value;

  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "generate",
      points: points
    })
  })
  .then(res => res.text())
  .then(text => {
    document.getElementById("result").innerText = text;
  });
}

function usePoints() {
  const phone = document.getElementById("phone").value;
  const points = document.getElementById("usePointsInput").value;

  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "usePoints",
      phone: phone,
      usePoints: points
    })
  })
  .then(res => res.text())
  .then(text => alert(text));
}

function addAmount() {
  const phone = document.getElementById("buyPhone").value;
  const amount = document.getElementById("amount").value;

  fetch(API, {
    method: "POST",
    body: JSON.stringify({
      action: "addPointsByAmount",
      phone: phone,
      amount: amount
    })
  })
  .then(res => res.text())
  .then(text => alert(text));
}

</script>

</body>
</html>
